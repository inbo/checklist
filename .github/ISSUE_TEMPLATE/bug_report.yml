name: Bug Report
description: File a bug report.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - ThierryO
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see! Please copy and paste both your code and the error message you received.
    validations:
      required: true
  - type: textarea
    id: minimal-reproducible-example
    attributes:
      label: Minimal reproducible example
      description: Please provide a minimal reproducible example that demonstrates the issue. This will help us understand the problem and work towards a solution more efficiently.
      placeholder: Please provide a minimal reproducible example that demonstrates the issue.
      render: R
  - type: textarea
    id: version
    attributes:
      label: Session information
      description: Please paste the output of `sessioninfo::session_info()` here.
      placeholder: Please paste the output of `sessioninfo::session_info()` here.
      render: Markdown
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](blob/main/.github/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
